<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 理科超级学习利器 v3.0</title>
<script>
window.MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath:[['$$','$$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"PingFang SC","Microsoft YaHei",sans-serif; }
body { background:#0f1424; color:#e8ecf5; min-height:100vh; }
header { background:linear-gradient(90deg,#1a2347,#2b1a47); padding:14px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
header h1 { font-size:20px; }
nav { display:flex; gap:6px; flex-wrap:wrap; padding:10px 16px; background:#141a30; position:sticky; top:0; z-index:10;}
nav button { background:#222b4d; color:#cfd8f5; border:none; padding:9px 13px; border-radius:20px; cursor:pointer; font-size:13px;}
nav button.active { background:linear-gradient(90deg,#4f6ef7,#9b59f7); color:#fff; }
main { padding:16px; max-width:960px; margin:0 auto; }
.page { display:none; } .page.show { display:block; }
.card { background:#1a2138; border:1px solid #2b3760; border-radius:14px; padding:16px; margin-bottom:14px; }
.card h2 { font-size:16px; color:#8fa6ff; margin-bottom:10px; }
button.act { background:linear-gradient(90deg,#4f6ef7,#9b59f7); border:none; color:#fff; padding:10px 18px; border-radius:10px; cursor:pointer; font-size:14px; margin:4px 4px 4px 0;}
button.sub { background:#2b3760; border:none; color:#cfd8f5; padding:8px 14px; border-radius:10px; cursor:pointer; font-size:13px; margin:4px 4px 4px 0;}
button:disabled { opacity:.5; cursor:not-allowed; }
select,input[type=text],input[type=password] { background:#10162b; color:#fff; border:1px solid #33406e; border-radius:8px; padding:9px; font-size:14px; }
.out { background:#10162b; border-radius:10px; padding:14px; margin-top:10px; min-height:40px; line-height:1.85; font-size:15px; white-space:pre-wrap; word-break:break-word;}
canvas.sim { background:#0a0e1c; border-radius:10px; width:100%; touch-action:none; }
.row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:6px 0;}
.row label { font-size:13px; color:#9fb0d8; }
input[type=range] { accent-color:#6c84ff; }
.chips { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0;}
.chips button { background:#243056; color:#cfe; border:none; padding:7px 12px; border-radius:16px; cursor:pointer; font-size:13px;}
.chips.math button { background:#2e2450; }
#video,#vsrc { width:100%; border-radius:10px; background:#000; }
img.preview { max-width:100%; border-radius:10px; margin-top:8px; }
.tag { font-size:12px; color:#7ee0a3; }
.info3d { font-size:13px; color:#7ee0a3; margin-top:6px; }
.hint { font-size:13px; color:#9fb0d8; line-height:1.8; }
.spin { display:inline-block; animation:r 1s linear infinite;} @keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header><h1>⚡ 理科超级学习利器</h1><span class="tag" id="keyState"></span></header>
<nav>
<button class="active" onclick="go('learn',this)">📖 讲解</button>
<button onclick="go('mathlab',this)">📐 数学实验</button>
<button onclick="go('lab',this)">🔬 2D实验</button>
<button onclick="go('lab3d',this)">🪐 3D实验</button>
<button onclick="go('quiz',this)">🎯 出题</button>
<button onclick="go('photo',this)">📷 拍照解题</button>
<button onclick="go('vidlab',this)">🎬 视频分析</button>
<button onclick="go('set',this)">⚙️ 设置</button>
</nav>
<main>

<!-- ===== 知识讲解 ===== -->
<section id="learn" class="page show">
<div class="card"><h2>⚛️ 物理知识点</h2><div class="chips" id="topicsP"></div></div>
<div class="card"><h2>📐 数学知识点</h2><div class="chips math" id="topicsM"></div></div>
<div class="card"><h2>自由提问（物理/数学都行）</h2>
<div class="row"><input type="text" id="customTopic" placeholder="输入任意问题，如：洛必达法则怎么用？" style="flex:1">
<button class="act" onclick="explain(qs('#customTopic').value)">讲解</button></div>
<div class="row"><button class="sub" onclick="speak(lastText)">🔊 朗读</button><button class="sub" onclick="speechSynthesis.cancel()">⏹ 停止</button><button class="sub" onclick="listen('customTopic')">🎤 语音提问</button></div>
<div class="out" id="learnOut">点击上方知识点，AI 老师将给出详细讲解（含公式推导、典型例题、易错点）。</div>
</section>

<!-- ===== 数学函数实验室 ===== -->
<section id="mathlab" class="page">
<div class="card"><h2>📈 函数图象实验室（输入任意 f(x)，拖动参数 a 看图象变化）</h2>
<div class="row"><input type="text" id="fx" value="a*sin(x)+x/3" style="flex:1" oninput="drawFx()">
<button class="sub" onclick="qs('#fx').value='a*x^2-2*x+1';drawFx()">二次</button>
<button class="sub" onclick="qs('#fx').value='sin(a*x)';drawFx()">三角</button>
<button class="sub" onclick="qs('#fx').value='a^x';drawFx()">指数</button>
<button class="sub" onclick="qs('#fx').value='x^3-a*x';drawFx()">三次</button>
<button class="sub" onclick="qs('#fx').value='log(x)/x*a';drawFx()">lnx/x</button></div>
<div class="row"><label>参数 a = <span id="av">1.0</span></label>
<input type="range" id="aSlider" min="-3" max="3" step="0.1" value="1" style="flex:1" oninput="qs('#av').textContent=(+this.value).toFixed(1);drawFx()">
<label><input type="checkbox" id="showD" onchange="drawFx()"> 显示导函数 f′(x)（虚线）</label></div>
<canvas id="cm" class="sim" width="900" height="420"></canvas>
<p class="hint">支持：+ - * / ^ ( )、sin cos tan、log(即ln)、log10、sqrt、abs、exp、pi、e。例：a*x^2、sin(x)/x、e^(-x^2)。<br>勾选导函数后观察：f′(x)>0 的区间 f 递增；f′(x)=0 处是极值点 —— 直观理解导数！</p>
<div class="row"><button class="act" onclick="explainFx()">🤖 让 AI 分析这个函数（单调性/极值/图象+')',14,20);
  if(qs('#showD').checked){ctx.fillStyle='#ff9e6c';ctx.fillText("f'(x) 虚线",14,40);}
}
function explainFx(){
  const el=qs('#fxOut');el.style.display='block';
  callAI([{role:'user',content:`请作为数学老师分析函数 f(x)=${qs('#fx').value}（其中参数 a=${qs('#aSlider').value}）：1.定义域 2.求导并分析单调区间与极值 3.图象关键特征（零点/渐近线/对称性等）4.参数a变化时图象如何变化 5.这个函数常出现在哪类考题中。公式用LaTeX行内$...$。`}],false,el);
}

/* ================= 2D 物理动画 ================= */
const c1=qs('#c1'),x1=c1.getContext('2d');let projs=[];
function fire(){const v=+qs('#v0').value,a=+qs('#ang').value*Math.PI/180;projs.push({x:30,y:300,vx:v*Math.cos(a)*4,vy:-v*Math.sin(a)*4,trail:[]});}
function arrow(ctx,x0,y0,x2,y2){ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x2,y2);ctx.stroke();}
function drawProj(){
  x1.clearRect(0,0,900,320);x1.strokeStyle='#33406e';x1.beginPath();x1.moveTo(0,302);x1.lineTo(900,302);x1.stroke();
  projs.forEach(p=>{p.x+=p.vx*0.016;p.y+=p.vy*0.016;p.vy+=9.8*4*0.016*4;if(p.y>300){p.y=300;p.vx=0;p.vy=0;}p.trail.push([p.x,p.y]);
    x1.strokeStyle='rgba(120,150,255,.6)';x1.beginPath();p.trail.forEach((q,i)=>i?x1.lineTo(q[0],q[1]):x1.moveTo(q[0],q[1]));x1.stroke();
    x1.fillStyle='#ffcf5e';x1.beginPath();x1.arc(p.x,p.y,7,0,7);x1.fill();
    if(p.vx||p.vy){x1.strokeStyle='#7ee0a3';arrow(x1,p.x,p.y,p.x+p.vx*.25,p.y);x1.strokeStyle='#f77';arrow(x1,p.x,p.y,p.x,p.y+p.vy*.25);}});
  if(projs.length>6)projs.shift();
  requestAnimationFrame(drawProj);
}
drawProj();

const c2=qs('#c2'),x2c=c2.getContext('2d');let waveOn=true,wt=0;
function drawWave(){
  if(waveOn&&qs('#lab').classList.contains('show')){wt+=0.05;const f=+qs('#freq').value;
    const img=x2c.createImageData(300,100);
    for(let j=0;j<100;j++)for(let i=0;i<300;i++){
      const d1=Math.hypot(i-90,j-50),d2=Math.hypot(i-210,j-50);
      const v=Math.sin(d1*0.25*f-wt*f*2)+Math.sin(d2*0.25*f-wt*f*2);
      const k=(j*300+i)*4,b=128+v*60;
      img.data[k]=b*0.35;img.data[k+1]=b*0.55;img.data[k+2]=Math.min(255,b*1.2);img.data[k+3]=255;}
    const off=document.createElement('canvas');off.width=300;off.height=100;off.getContext('2d').putImageData(img,0,0);
    x2c.imageSmoothingEnabled=true;x2c.drawImage(off,0,0,300,100,0,0,900,300);
    x2c.fillStyle='#ffcf5e';[[270,150],[630,150]].forEach(s=>{x2c.beginPath();x2c.arc(s[0],s[1],6,0,7);x2c.fill();});}
  requestAnimationFrame(drawWave);
}
drawWave();

const c3=qs('#c3'),x3=c3.getContext('2d');let th=0.7,om=0,dragP=false;
const PX=450,PY=30;
c3.addEventListener('pointerdown',e=>{dragP=true;om=0;movePend(e);});
c3.addEventListener('pointermove',e=>dragP&&movePend(e));
window.addEventListener('pointerup',()=>dragP=false);
function movePend(e){const r=c3.getBoundingClientRect();const mx=(e.clientX-r.left)*900/r.width,my=(e.clientY-r.top)*320/r.height;th=Math.atan2(mx-PX,my-PY);}
function drawPend(){
  const L=+qs('#Lp').value,Lpx=L*80;
  if(!dragP){const a=-9.8/L*Math.sin(th);om+=a*0.016;om*=0.999;th+=om*0.016;}
  const bx=PX+Lpx*Math.sin(th),by=PY+Lpx*Math.cos(th);
  x3.clearRect(0,0,900,320);
  x3.strokeStyle='#556';x3.beginPath();x3.moveTo(PX-40,PY);x3.lineTo(PX+40,PY);x3.stroke();
  x3.strokeStyle='#9fb0d8';x3.beginPath();x3.moveTo(PX,PY);x3.lineTo(bx,by);x3.stroke();
  x3.fillStyle='#9b59f7';x3.beginPath();x3.arc(bx,by,14,0,7);x3.fill();
  x3.fillStyle='#7ee0a3';x3.font='13px sans-serif';
  x3.fillText(`周期 T≈2π√(L/g)=${(2*Math.PI*Math.sqrt(L/9.8)).toFixed(2)} s   角度 ${(th*180/Math.PI).toFixed(1)}°`,20,24);
  requestAnimationFrame(drawPend);
}
drawPend();

/* ================= 3D 实验室 ================= */
const three={inited:false};
function dragRotate(cv,cb){let d=false,lx=0,ly=0;
  cv.addEventListener('pointerdown',e=>{d=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('pointermove',e=>{if(!d)return;cb(e.clientX-lx,e.clientY-ly);lx=e.clientX;ly=e.clientY;});
  window.addEventListener('pointerup',()=>d=false);}
function init3D(){
  if(three.inited)return;
  if(!window.THREE){qs('#orbInfo').textContent='⚠️ 3D 库加载中，请稍后再点一次此标签页';return;}
  three.inited=true;setupOrbit();setupHelix();loop3d();
}
function setupOrbit(){
  const cv=qs('#t1');
  const R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  const sc=new THREE.Scene();sc.background=new THREE.Color(0x06091a);
  const cam=new THREE.PerspectiveCamera(55,2,0.1,2000);
  let thA=0.6,phA=1.15,dist=36;
  function setCam(){cam.position.set(dist*Math.sin(phA)*Math.cos(thA),dist*Math.cos(phA),dist*Math.sin(phA)*Math.sin(thA));cam.lookAt(0,0,0);}
  setCam();
  dragRotate(cv,(dx,dy)=>{thA+=dx*0.008;phA=Math.min(2.8,Math.max(0.3,phA+dy*0.008));setCam();});
  sc.add(new THREE.AmbientLight(0x8899ff,0.6));
  const sun=new THREE.PointLight(0xffffff,1);sun.position.set(50,30,20);sc.add(sun);
  const sg=new THREE.BufferGeometry(),sp=[];
  for(let i=0;i<400;i++)sp.push((Math.random()-.5)*400,(Math.random()-.5)*400,(Math.random()-.5)*400);
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  sc.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.7})));
  const earth=new THREE.Mesh(new THREE.SphereGeometry(3,32,32),new THREE.MeshPhongMaterial({color:0x3a7bd5,emissive:0x112244}));
  sc.add(earth);
  const sat=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),new THREE.MeshPhongMaterial({color:0xffcf5e,emissive:0x554411}));
  sc.add(sat);
  const GM=600;let pos,vel,trail=[],trailLine=null,crashed=false;
  window.resetOrbit=function(){pos=new THREE.Vector3(10,0,0);vel=new THREE.Vector3(0,0,Math.sqrt(GM/10)*(+qs('#orbV').value));trail=[];crashed=false;};
  resetOrbit();
  three.orbit=function(){
    if(!crashed)for(let k=0;k<4;k++){
      const r=pos.length();
      if(r<=3.1){crashed=true;break;}
      const a=pos.clone().multiplyScalar(-GM/(r*r*r));
      vel.addScaledVector(a,0.004);pos.addScaledVector(vel,0.004);}
    sat.position.copy(pos);earth.rotation.y+=0.003;
    trail.push(pos.clone());if(trail.length>900)trail.shift();
    if(trailLine){sc.remove(trailLine);trailLine.geometry.dispose();}
    trailLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(trail),new THREE.LineBasicMaterial({color:0x7ee0a3}));
    sc.add(trailLine);
    qs('#orbInfo').textContent=crashed?'💥 速度不足，卫星坠毁！调高速度后点「重新发射」':`轨道半径 r=${pos.length().toFixed(1)}   速度 v=${vel.length().toFixed(2)}${pos.length()>120?'   🚀 飞向深空…':''}`;
    R.render(sc,cam);};
}
function setupHelix(){
  const cv=qs('#t2');
  const R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  const sc=new THREE.Scene();sc.background=new THREE.Color(0x090618);
  const cam=new THREE.PerspectiveCamera(55,2,0.1,1000);
  let thA=0.8,phA=1.2,dist=26;
  function setCam(){cam.position.set(dist*Math.sin(phA)*Math.cos(thA),dist*Math.cos(phA),dist*Math.sin(phA)*Math.sin(thA));cam.lookAt(0,0,0);}
  setCam();
  dragRotate(cv,(dx,dy)=>{thA+=dx*0.008;phA=Math.min(2.8,Math.max(0.3,phA+dy*0.008));setCam();});
  sc.add(new THREE.AmbientLight(0xffffff,0.8));
  for(let i=-1;i<=1;i++)for(let j=-1;j<=1;j++)
    sc.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0),new THREE.Vector3(i*6,-8,j*6),16,0x4dde8a,1.6,0.9));
  const ball=new THREE.Mesh(new THREE.SphereGeometry(0.45,16,16),new THREE.MeshPhongMaterial({color:0xff6b9d,emissive:0x551133}));
  sc.add(ball);
  let pos=new THREE.Vector3(3,-8,0),v=new THREE.Vector3(3,1.5,0),trail=[],trailLine=null;
  three.helix=function(){
    const B=+qs('#Bs').value,dt=0.02;
    v.y=+qs('#vp').value;
    for(let k=0;k<2;k++){
      const w=B*dt,vx=v.x,vz=v.z;
      v.x=vx*Math.cos(w)+vz*Math.sin(w);
      v.z=-vx*Math.sin(w)+vz*Math.cos(w);
      pos.addScaledVector(v,dt);}
    if(pos.y>9){pos.y=-8;trail=[];}
    ball.position.copy(pos);
    trail.push(pos.clone());if(trail.length>600)trail.shift();
    if(trailLine){sc.remove(trailLine);trailLine.geometry.dispose();}
    trailLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(trail),new THREE.LineBasicMaterial({color:0xff9ec6}));
    sc.add(trailLine);
    R.render(sc,cam);};
}
function loop3d(){
  if(qs('#lab3d').classList.contains('show')){three.orbit&&three.orbit();three.helix&&three.helix();}
  requestAnimationFrame(loop3d);
}
</script>
</body>
</html>
